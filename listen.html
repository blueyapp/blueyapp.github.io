<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluey Listen</title>    
  <meta name="title" content="Bluey Listen">     
  <meta name="description" content="Listen to podcasts and audio books from Bluey.">
  <meta name="keywords" content="bluey, bluey, bluey">  
  <meta name="robots" content="index, follow">     
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">   
  <meta name="language" content="English">   
  <meta name="author" content="Bluey Heeler">    

  <!-- Meta tags for social share preview -->       
  <meta property="og:title" content="Bluey Listen">     
  <meta property="og:description" content="Listen to podcasts and audio books from Bluey.">     
  <meta property="og:image" content="https://live-production.wcms.abc-cdn.net.au/4e1732337b3e7ca6c550b04e5bf49c21?impolicy=wcms_crop_resize&cropH=1125&cropW=2000&xPos=0&yPos=0&width=1200&height=675"> 
  <meta property="og:url" content="https://pages.blueynet.org/listen">
  <meta name="twitter:card" content="summary_large_image">    
  <meta name="twitter:title" content="Bluey Listen"> 
  <meta name="twitter:description" content="Listen to podcasts and audio books from Bluey.">     
  <meta name="twitter:image" content="https://live-production.wcms.abc-cdn.net.au/4e1732337b3e7ca6c550b04e5bf49c21?impolicy=wcms_crop_resize&cropH=1125&cropW=2000&xPos=0&yPos=0&width=1200&height=675">
      <link rel="icon" href="/bluey-star.ico" type="image/x-icon">
      <link href="/fonts/HelloHeadline.css" rel="stylesheet" type="text/css">
      <style>
         * { box-sizing: border-box; margin: 0; padding: 0; }

         body {
            font-family: "Hello Headline", Arial, sans-serif !important;
            background-color: #87c0e8 !important;
            color: #fff;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            overflow-x: hidden;
         }

         /* ===== TOP NAV BAR ===== */
         .top-nav {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 12px 30px;
            gap: 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 5000;
         }
         .top-nav a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
         }
         .top-nav a:hover { color: #e0e0e0; }

         .hamburger-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            z-index: 1001;
         }
         .hamburger-btn svg { width: 28px; height: 28px; stroke: #fff; }
         body.dark .hamburger-btn svg { stroke: #fbbf24; }
         .nav-links { display: contents; }

         .mobile-menu-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
         }
         .mobile-menu-overlay.open { display: block; }

         /* ===== Hero ===== */
         .hero {
            position: relative;
            height: 42vh;
            min-height: 280px;
            max-height: 460px;
            background: radial-gradient(ellipse at center, #a8d5f0 0%, #5a9fd6 70%, #3d7fb8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
         }
         .hero::before {
            content: '';
            position: absolute;
            top: -20%; left: -10%; right: -10%; bottom: -20%;
            background-image:
               radial-gradient(circle at 15% 30%, rgba(255,255,255,0.3) 0%, transparent 40%),
               radial-gradient(circle at 80% 70%, rgba(255,255,255,0.2) 0%, transparent 45%),
               radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15) 0%, transparent 60%);
            pointer-events: none;
         }
         .hero::after {
            content: '';
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 65%;
            z-index: 1;
            background: linear-gradient(to bottom,
               transparent 0%,
               rgba(135,192,232,0.4) 40%,
               rgba(135,192,232,0.85) 80%,
               #87c0e8 100%);
            pointer-events: none;
         }
         body.dark .hero::after {
            background: linear-gradient(to bottom,
               transparent 0%,
               rgba(25,29,37,0.4) 40%,
               rgba(25,29,37,0.85) 80%,
               #191d25 100%);
         }
         .hero-logo {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            z-index: 0;
         }

         /* ===== Category rows ===== */
         .category {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 20px 20px;
         }
         .category-title {
            font-family: 'Hello Headline', Arial, sans-serif;
            font-size: 26px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 14px;
            padding-left: 6px;
         }

         .album-row {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            overflow-y: visible;
            padding: 10px 6px 30px;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.35) transparent;
         }
         .album-row::-webkit-scrollbar { height: 7px; }
         .album-row::-webkit-scrollbar-track { background: transparent; }
         .album-row::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.35);
            border-radius: 4px;
         }

         /* ===== Album card (Spotify-style square) ===== */
         .album-card {
            flex: 0 0 auto;
            width: 180px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s ease;
            cursor: pointer;
         }
         .album-card-img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
            background: rgba(0,0,0,0.15);
         }
         .album-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
         }
         .album-card-title {
            margin-top: 12px;
            font-family: 'Hello Headline', Arial, sans-serif;
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
         }
         .album-card-artist {
            margin-top: 4px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
         }

         @media (hover: hover) and (pointer: fine) {
            .album-card:hover {
               transform: scale(1.04);
            }
            .album-card:hover .album-card-title {
               color: #ffe8a8;
            }
         }
         @media (hover: none), (pointer: coarse) {
            .album-card:active { transform: scale(0.97); }
         }

         /* ===== Dark mode ===== */
         body.dark {
            background: #191d25 !important;
            color: #dbeafe !important;
         }
         body.dark .top-nav a { color: #fbbf24 !important; }
         body.dark .hero {
            background: radial-gradient(ellipse at center, #2a3447 0%, #1a1f2c 70%, #0f131a 100%);
         }
         body.dark .category-title { color: #fbbf24; }
         body.dark .album-card-title { color: #fbbf24; }
         body.dark .album-card-artist { color: rgba(219,234,254,0.65); }
         @media (hover: hover) and (pointer: fine) {
            body.dark .album-card:hover .album-card-title { color: #ffd700; }
         }

         /* ===== Dark mode toggle ===== */
         .darkmode-toggle {
            background: none; border: none; cursor: pointer;
            border-radius: 50%; margin-left: 8px;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            outline: none; padding: 2px; transition: background 0.2s;
         }
         .darkmode-toggle:focus, .darkmode-toggle:hover { background: rgba(128,128,128,0.12); }
         .darkmode-toggle svg { width: 24px; height: 24px; display: block; pointer-events: none; }
         .dark .darkmode-toggle .sun { display: none; }
         .dark .darkmode-toggle .moon { display: block; }
         .darkmode-toggle .moon { display: none; }
         .darkmode-toggle .sun { display: block; }

         /* ===== Responsive ===== */
         @media (max-width: 768px) {
            .hero { height: 34vh; min-height: 220px; }
            .hero::after { height: 85%; }
            .category { padding: 8px 14px 16px; }
            .category-title { font-size: 22px; }
            .album-card { width: 140px; }
            .album-card-title { font-size: 14px; }
            .album-card-artist { font-size: 12px; }
         }
         @media (max-width: 600px) {
            .top-nav { padding: 10px 16px; justify-content: space-between; }
            .hamburger-btn { display: block; }
            .nav-links {
               display: none;
               position: fixed;
               top: 0; left: 0;
               width: 220px; height: 100vh;
               background: #5a9fc6;
               flex-direction: column;
               padding: 60px 24px 24px;
               gap: 20px;
               z-index: 1000;
               box-shadow: 4px 0 20px rgba(0,0,0,0.4);
            }
            body.dark .nav-links { background: #191d25; }
            .nav-links.open { display: flex; }
            .nav-links a { font-size: 18px; }
            .nav-links .darkmode-toggle { align-self: flex-start; }
         }
         @media (max-width: 480px) {
            .album-card { width: 125px; }
            .album-row { gap: 14px; }
         }
      </style>
   </head>
   <body>
      <!-- Top Navigation -->
      <nav class="top-nav">
         <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <line x1="3" y1="6" x2="21" y2="6"/>
               <line x1="3" y1="12" x2="21" y2="12"/>
               <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
         </button>
         <div class="nav-links" id="navLinks">
            <a href="/">Home</a>
            <a href="/watch">Watch</a>
            <a href="/music">Music</a>
            <a href="/listen">Listen</a>
            <button class="darkmode-toggle" id="darkToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
               <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="5"/>
                  <g>
                     <line x1="12" y1="1" x2="12" y2="3"/>
                     <line x1="12" y1="21" x2="12" y2="23"/>
                     <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                     <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                     <line x1="1" y1="12" x2="3" y2="12"/>
                     <line x1="21" y1="12" x2="23" y2="12"/>
                     <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                     <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                  </g>
               </svg>
               <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
               </svg>
            </button>
         </div>
      </nav>
      <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

      <!-- Hero -->
      <div class="hero">
         <img src="https://live-production.wcms.abc-cdn.net.au/4e1732337b3e7ca6c550b04e5bf49c21?impolicy=wcms_crop_resize&cropH=800&cropW=2000&xPos=0&yPos=336&width=2000&height=1125" alt="Bluey" class="hero-logo">
      </div>

      <!-- Category: Podcasts -->
      <div class="category">
         <h2 class="category-title">Podcasts</h2>
         <div class="album-row">
            <a class="album-card" href="/listen/behind-bluey">
               <div class="album-card-img-wrap">
                  <img src="https://live-production.wcms.abc-cdn.net.au/93486be7593cf1dd60324dc4fae6dfe5" alt="Behind Bluey" loading="lazy">
               </div>
               <div class="album-card-title">Behind Bluey</div>
            </a>
         </div>
      </div>

      <!-- Category: Audio Books -->
      <div class="category">
         <h2 class="category-title">Audio Books</h2>
         <div class="album-row">
            <a class="album-card" href="/listen/bluey-listen-along">
               <div class="album-card-img-wrap">
                  <img src="https://live-production.wcms.abc-cdn.net.au/ffcb470f2d3b8a77df6164cdfe6a9c79" alt="Bluey Listen Along" loading="lazy">
               </div>
               <div class="album-card-title">Bluey Listen Along</div>
            </a>
            <a class="album-card" href="/listen/bluey-book-reads">
               <div class="album-card-img-wrap">
                  <img src="https://live-production.wcms.abc-cdn.net.au/db55c3bb3734d98c27ea4d97a17e43af" alt="Bluey Book Reads" loading="lazy">
               </div>
               <div class="album-card-title">Bluey Book Reads</div>
            </a>
         </div>
      </div>

      <script>
         // Hamburger menu (mobile)
         const hamburgerBtn = document.getElementById('hamburgerBtn');
         const navLinks = document.getElementById('navLinks');
         const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');
         hamburgerBtn.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            mobileMenuOverlay.classList.toggle('open');
         });
         mobileMenuOverlay.addEventListener('click', () => {
            navLinks.classList.remove('open');
            mobileMenuOverlay.classList.remove('open');
         });

         // Dark mode logic (shared across site)
         const themeKey = "bluey-site-theme";
         const root = document.body;
         const darkToggle = document.getElementById("darkToggle");
         function setTheme(dark) {
            if (dark) { root.classList.add('dark'); localStorage.setItem(themeKey, "dark"); }
            else { root.classList.remove('dark'); localStorage.setItem(themeKey, "light"); }
         }
         (() => {
            const saved = localStorage.getItem(themeKey);
            if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
               setTheme(true);
            } else {
               setTheme(false);
            }
         })();
         darkToggle.onclick = () => setTheme(!root.classList.contains('dark'));
      </script>
   </body>
</html>
