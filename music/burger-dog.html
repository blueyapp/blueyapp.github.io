          <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button class="ctrl-btn" id="btnPrev" title="Previous">
          <svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20" fill="currentColor" stroke="none"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="btnPlay" title="Play">
          <svg viewBox="0 0 24 24" id="playIcon"><polygon points="6,3 20,12 6,21"/></svg>
        </button>
        <button class="ctrl-btn" id="btnNext" title="Next">
          <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4" fill="currentColor" stroke="none"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="ctrl-btn" id="btnRepeat" title="Repeat">
          <svg viewBox="0 0 24 24"><polyline points="17 1 21 1 21 5"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 23 3 19"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="time-display" id="timeDisplay">0:00 / 0:00</div>
      <div class="right-controls">
        <button class="ctrl-btn" id="btnCast" title="Cast" style="display:none;">
          <svg viewBox="0 0 24 24"><path d="M2 16.1A5 5 0 0 1 5.9 20M2 12.05A9 9 0 0 1 9.95 20M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/><line x1="2" y1="20" x2="2.01" y2="20"/></svg>
        </button>
      </div>
    </div>

    <!-- Hidden audio -->
    <audio id="audioPlayer" preload="none"></audio>

    <!-- Safari popup -->
    <div id="safariPopup" class="popup">
      <div class="popup-content">
        <button class="popup-close" onclick="document.getElementById('safariPopup').style.display='none'">&times;</button>
        <h2>Autoplay Blocked</h2>
        <p style="margin:14px 0 0;color:rgba(255,255,255,0.7);font-size:14px;">Due to browser restrictions, please tap the play button to start.</p>
      </div>
    </div>

    <script>
      // === Dark mode ===
      const themeKey = "bluey-site-theme";
      const root = document.body;
      const darkToggle = document.getElementById("darkToggle");
      function setTheme(dark) {
        if (dark) { root.classList.add('dark'); localStorage.setItem(themeKey, "dark"); }
        else { root.classList.remove('dark'); localStorage.setItem(themeKey, "light"); }
      }
      (() => {
        const saved = localStorage.getItem(themeKey);
        if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) setTheme(true);
        else setTheme(false);
      })();
      darkToggle.onclick = () => setTheme(!root.classList.contains('dark'));

      // === Hamburger menu ===
      const hamburgerBtn = document.getElementById('hamburgerBtn');
      const navLinks = document.getElementById('navLinks');
      const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');
      hamburgerBtn.addEventListener('click', () => { navLinks.classList.toggle('open'); mobileMenuOverlay.classList.toggle('open'); });
      mobileMenuOverlay.addEventListener('click', () => { navLinks.classList.remove('open'); mobileMenuOverlay.classList.remove('open'); });
      navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { navLinks.classList.remove('open'); mobileMenuOverlay.classList.remove('open'); }));
    </script>

    <script>
      // === Server configs ===
      const SERVERS = {
        normal: {
          url: 'https://blueynet.org',
          userId: 'ba603d94a7c24b3b8c7e7ea2fedc9162',
          apiKey: '6b2548952ea2439ea800b8cd3f1072d1',
          parentId: '172676',
          useEmbyPath: true  // uses /emby/ prefix
        },
        dolby: {
          url: 'https://media.blueynet.org',
          userId: '5d47298a0c97453893198c8f9c634858',
          apiKey: 'ef82e7b6ea894d5c9a10bf7b97b2f235',
          parentId: '255df2ac5fab37436595a9a4f97cb33c',
          useEmbyPath: false  // no /emby/ prefix
        }
      };

      // === State ===
      let isDolby = false;
      let musicItems = [];
      let currentIndex = -1;
      let isPlaying = false;
      let shuffleMode = false;
      let repeatMode = 0; // 0=off, 1=all, 2=one
      let hlsInstance = null;

      // === DOM refs ===
      const audio = document.getElementById('audioPlayer');
      const playerBar = document.getElementById('playerBar');
      const barThumb = document.getElementById('barThumb');
      const barTitle = document.getElementById('barTitle');
      const barArtist = document.getElementById('barArtist');
      const btnPlay = document.getElementById('btnPlay');
      const playIcon = document.getElementById('playIcon');
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');
      const btnShuffle = document.getElementById('btnShuffle');
      const btnRepeat = document.getElementById('btnRepeat');
      const btnCast = document.getElementById('btnCast');
      const progressWrap = document.getElementById('progressWrap');
      const progressFill = document.getElementById('progressFill');
      const timeDisplay = document.getElementById('timeDisplay');
      const trackListEl = document.getElementById('trackList');
      const listHeader = document.getElementById('listHeader');
      const albumMeta = document.getElementById('albumMeta');
      const loadingSpinner = document.getElementById('loadingSpinner');
      const dolbyToggle = document.getElementById('dolbyToggle');
      const albumPlayBtn = document.getElementById('albumPlayBtn');

      function getServer() { return isDolby ? SERVERS.dolby : SERVERS.normal; }
      function apiPath(srv) { return srv.useEmbyPath ? '/emby' : ''; }

      // === Fetch tracks ===
      async function fetchTracks() {
        const srv = getServer();
        loadingSpinner.classList.add('visible');
        trackListEl.innerHTML = '';
        try {
          const r = await fetch(`${srv.url}${apiPath(srv)}/Users/${srv.userId}/Items?ParentId=${srv.parentId}&Fields=BasicSyncInfo,CanDelete,PrimaryImageAspectRatio,SyncStatus&ImageTypeLimit=1&EnableTotalRecordCount=false&${srv.useEmbyPath ? 'X-Emby-Token' : 'api_key'}=${srv.apiKey}`);
          const data = await r.json();
          return data.Items || [];
        } catch (e) {
          console.error('Fetch error:', e);
          return [];
        } finally {
          loadingSpinner.classList.remove('visible');
        }
      }

      // === Render track list ===
      function renderTracks(items) {
        trackListEl.innerHTML = '';
        // Sort by IndexNumber
        items.sort((a, b) => (a.IndexNumber || 0) - (b.IndexNumber || 0));
        listHeader.textContent = isDolby ? `Tracks (${items.length}) - Dolby Atmos` : `Tracks (${items.length})`;
        albumMeta.textContent = `Single \u2022 ${items.length} songs${isDolby ? ' \u2022 Dolby Atmos' : ''}`;

        const srv = getServer();
        items.forEach((item, idx) => {
          const li = document.createElement('li');
          li.className = 'track-item';
          li.tabIndex = 0;
          const tag = item.ImageTags?.Primary || '';
          const thumbUrl = tag ? `${srv.url}${apiPath(srv)}/Items/${item.Id}/Images/Primary?tag=${tag}&maxWidth=128&${srv.useEmbyPath ? 'X-Emby-Token' : 'api_key'}=${srv.apiKey}` : '';
          const duration = item.RunTimeTicks ? formatTime(Math.round(item.RunTimeTicks / 10000000)) : '';
          const artists = (item.Artists || []).join(', ') || (item.AlbumArtists || []).map(a => a.Name).join(', ') || '';

          li.innerHTML = `
            <span class="track-num">${item.IndexNumber || idx + 1}</span>
            ${thumbUrl ? `<img class="track-thumb" src="${thumbUrl}" alt="" />` : ''}
            <div class="track-info">
              <div class="track-name">${item.Name}</div>
              <div class="track-artist">${artists}</div>
            </div>
            <span class="track-duration">${duration}</span>
            <button class="track-download" title="Download" onclick="event.stopPropagation();window.open('${srv.url}${apiPath(srv)}/Items/${item.Id}/Download?${srv.useEmbyPath ? 'api_key' : 'api_key'}=${srv.apiKey}','_blank')">
              <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          `;
          li.addEventListener('click', () => playTrack(idx));
          li.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); playTrack(idx); }
            else if (e.key === 'ArrowDown') { e.preventDefault(); const next = li.nextElementSibling; if (next) next.focus(); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); const prev = li.previousElementSibling; if (prev) prev.focus(); }
          });
          trackListEl.appendChild(li);
        });
      }

      function updateHighlight() {
        const items = trackListEl.querySelectorAll('.track-item');
        items.forEach((li, i) => li.classList.toggle('playing', i === currentIndex));
      }

      // === Play track ===
      function playTrack(index) {
        if (index < 0 || index >= musicItems.length) return;
        currentIndex = index;
        const item = musicItems[index];
        const srv = getServer();
        const tag = item.ImageTags?.Primary || '';
        const thumbUrl = tag ? `${srv.url}${apiPath(srv)}/Items/${item.Id}/Images/Primary?tag=${tag}&maxWidth=256&${srv.useEmbyPath ? 'X-Emby-Token' : 'api_key'}=${srv.apiKey}` : '';
        const artists = (item.Artists || []).join(', ') || (item.AlbumArtists || []).map(a => a.Name).join(', ') || '';

        // Build audio URL
        let audioUrl;
        if (isDolby) {
          audioUrl = `${srv.url}/Audio/${item.Id}/universal?UserId=${srv.userId}&MaxStreamingBitrate=4000000&Container=ts&TranscodingContainer=ts&TranscodingProtocol=hls&AudioCodec=aac&api_key=${srv.apiKey}`;
        } else {
          audioUrl = `${srv.url}/emby/Audio/${item.Id}/universal?UserId=${srv.userId}&MaxStreamingBitrate=4000000&Container=opus,mp3|mp3,mp2,mp3|mp2,m4a|aac,mp4|aac,flac,webma,webm,wav|PCM_S16LE,wav|PCM_S24LE,ogg&TranscodingContainer=aac&TranscodingProtocol=hls&AudioCodec=aac&api_key=${srv.apiKey}`;
        }

        // Update player bar
        playerBar.classList.add('visible');
        barThumb.src = thumbUrl;
        barTitle.textContent = item.Name;
        barArtist.textContent = artists;
        updateHighlight();

        // Destroy previous HLS instance
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

        // Play with HLS.js for Dolby, native for normal
        if (isDolby && Hls.isSupported()) {
          hlsInstance = new Hls();
          hlsInstance.loadSource(audioUrl);
          hlsInstance.attachMedia(audio);
          hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            audio.play().then(() => setPlayState(true)).catch(handleAutoplayErr);
          });
          hlsInstance.on(Hls.Events.ERROR, (ev, data) => {
            console.error('HLS error:', data.type, data.details);
          });
        } else {
          audio.src = audioUrl;
          audio.play().then(() => setPlayState(true)).catch(handleAutoplayErr);
        }

        // MediaSession
        if ('mediaSession' in navigator) {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: item.Name,
            artist: artists,
            album: item.Album || 'Burger Dog / Bluey Theme Tune (Burger Dog Version) [feat. Daniel O\'Brien]',
            artwork: thumbUrl ? [{ src: thumbUrl, sizes: '512x512', type: 'image/png' }] : []
          });
          navigator.mediaSession.setActionHandler('play', () => { audio.play(); setPlayState(true); });
          navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); setPlayState(false); });
          navigator.mediaSession.setActionHandler('nexttrack', playNext);
          navigator.mediaSession.setActionHandler('previoustrack', playPrev);
        }

        document.title = `${item.Name} - Burger Dog / Bluey Theme Tune (Burger Dog Version) [feat. Daniel O'Brien]`;

        // Cast
        if (window.__castSession) {
          castTrack(item, audioUrl, thumbUrl, artists);
        }
      }

      function handleAutoplayErr(err) {
        console.warn('Autoplay blocked:', err);
        setPlayState(false);
        if (err && err.name === 'NotAllowedError' && navigator.userAgent.includes('Safari') && !navigator.userAgent.includes('Chrome')) {
          document.getElementById('safariPopup').style.display = 'flex';
        }
      }

      function setPlayState(playing) {
        isPlaying = playing;
        playIcon.innerHTML = playing
          ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
          : '<polygon points="6,3 20,12 6,21"/>';
      }

      // === Controls ===
      btnPlay.addEventListener('click', () => {
        if (currentIndex < 0) { if (musicItems.length) playTrack(0); return; }
        if (audio.paused) { audio.play(); setPlayState(true); }
        else { audio.pause(); setPlayState(false); }
      });

      albumPlayBtn.addEventListener('click', () => {
        if (musicItems.length) playTrack(0);
      });

      btnNext.addEventListener('click', playNext);
      btnPrev.addEventListener('click', playPrev);

      function playNext() {
        if (musicItems.length === 0) return;
        if (repeatMode === 2) { audio.currentTime = 0; audio.play(); return; }
        let next;
        if (shuffleMode) {
          next = Math.floor(Math.random() * musicItems.length);
        } else {
          next = currentIndex + 1;
          if (next >= musicItems.length) {
            if (repeatMode === 1) next = 0; else return;
          }
        }
        playTrack(next);
      }

      function playPrev() {
        if (musicItems.length === 0) return;
        if (audio.currentTime > 3) { audio.currentTime = 0; return; }
        let prev = currentIndex - 1;
        if (prev < 0) prev = repeatMode === 1 ? musicItems.length - 1 : 0;
        playTrack(prev);
      }

      audio.addEventListener('ended', playNext);

      // Shuffle
      btnShuffle.addEventListener('click', () => {
        shuffleMode = !shuffleMode;
        btnShuffle.classList.toggle('active', shuffleMode);
      });

      // Repeat: off -> all -> one -> off
      btnRepeat.addEventListener('click', () => {
        repeatMode = (repeatMode + 1) % 3;
        btnRepeat.classList.toggle('active', repeatMode > 0);
        if (repeatMode === 2) {
          btnRepeat.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="17 1 21 1 21 5"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 23 3 19"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="10" y="15" font-size="8" fill="currentColor" stroke="none" font-weight="bold">1</text></svg>';
        } else {
          btnRepeat.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="17 1 21 1 21 5"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 23 3 19"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>';
        }
      });

      // === Progress bar ===
      audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = pct + '%';
        timeDisplay.textContent = `${formatTime(Math.floor(audio.currentTime))} / ${formatTime(Math.floor(audio.duration))}`;
      });

      progressWrap.addEventListener('click', (e) => {
        if (!audio.duration) return;
        const rect = progressWrap.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
      });

      let dragging = false;
      progressWrap.addEventListener('mousedown', (e) => { dragging = true; seekFromEvent(e); });
      document.addEventListener('mousemove', (e) => { if (dragging) seekFromEvent(e); });
      document.addEventListener('mouseup', () => { dragging = false; });
      progressWrap.addEventListener('touchstart', (e) => { dragging = true; seekFromEvent(e.touches[0]); }, { passive: true });
      document.addEventListener('touchmove', (e) => { if (dragging) seekFromEvent(e.touches[0]); }, { passive: true });
      document.addEventListener('touchend', () => { dragging = false; });

      function seekFromEvent(e) {
        if (!audio.duration) return;
        const rect = progressWrap.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        audio.currentTime = pct * audio.duration;
        progressFill.style.width = (pct * 100) + '%';
      }

      // === Dolby Atmos toggle ===
      dolbyToggle.addEventListener('click', async () => {
        // Remember playing state
        const wasPlaying = isPlaying;
        const playingName = currentIndex >= 0 ? musicItems[currentIndex]?.Name : null;

        // Stop current playback
        audio.pause();
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        setPlayState(false);

        isDolby = !isDolby;
        dolbyToggle.classList.toggle('active', isDolby);

        // Re-fetch track list
        musicItems = await fetchTracks();
        if (musicItems.length) {
          musicItems.sort((a, b) => (a.IndexNumber || 0) - (b.IndexNumber || 0));
          renderTracks(musicItems);

          // Try to resume the same track by name
          if (playingName) {
            const matchIdx = musicItems.findIndex(t => t.Name === playingName);
            if (matchIdx >= 0) {
              playTrack(matchIdx);
              return;
            }
          }
          currentIndex = -1;
          updateHighlight();
        }
      });

      // === Chromecast ===
      window.__castSession = null;
      window['__onGCastApiAvailable'] = function(isAvailable) {
        if (!isAvailable) return;
        const ctx = cast.framework.CastContext.getInstance();
        ctx.setOptions({
          receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
          autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
        });
        btnCast.style.display = 'flex';
        ctx.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (e) => {
          if (e.sessionState === cast.framework.SessionState.SESSION_STARTED || e.sessionState === cast.framework.SessionState.SESSION_RESUMED) {
            window.__castSession = ctx.getCurrentSession();
            btnCast.classList.add('active');
            if (currentIndex >= 0) {
              const item = musicItems[currentIndex];
              const srv = getServer();
              const tag = item.ImageTags?.Primary || '';
              const thumbUrl = tag ? `${srv.url}${apiPath(srv)}/Items/${item.Id}/Images/Primary?tag=${tag}&maxWidth=256&${srv.useEmbyPath ? 'X-Emby-Token' : 'api_key'}=${srv.apiKey}` : '';
              const artists = (item.Artists || []).join(', ') || '';
              castTrack(item, audio.src, thumbUrl, artists);
            }
          } else if (e.sessionState === cast.framework.SessionState.SESSION_ENDED) {
            window.__castSession = null;
            btnCast.classList.remove('active');
          }
        });
      };

      btnCast.addEventListener('click', () => {
        const ctx = cast.framework.CastContext.getInstance();
        if (window.__castSession) ctx.endCurrentSession(true);
        else ctx.requestSession();
      });

      function castTrack(item, audioUrl, thumbUrl, artists) {
        if (!window.__castSession) return;
        const mediaInfo = new chrome.cast.media.MediaInfo(audioUrl, 'audio/mp4');
        mediaInfo.metadata = new chrome.cast.media.MusicTrackMediaMetadata();
        mediaInfo.metadata.title = item.Name;
        mediaInfo.metadata.albumName = item.Album || 'Burger Dog / Bluey Theme Tune (Burger Dog Version) [feat. Daniel O\'Brien]';
        mediaInfo.metadata.artist = artists || '';
        if (thumbUrl) mediaInfo.metadata.images = [new chrome.cast.Image(thumbUrl)];
        const request = new chrome.cast.media.LoadRequest(mediaInfo);
        request.currentTime = audio.currentTime || 0;
        window.__castSession.loadMedia(request).then(() => {
          audio.pause();
          setPlayState(true);
        }).catch(err => console.error('Cast load error:', err));
      }

      // === Keyboard shortcuts ===
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === ' ' && !e.target.closest('.track-item')) {
          e.preventDefault();
          btnPlay.click();
        }
      });

      // === Utility ===
      function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${m}:${sec < 10 ? '0' : ''}${sec}`;
      }

      // === Init ===
      (async () => {
        // Check URL for dolby param
        if (window.location.search.includes('dolby') || window.location.pathname.includes('dolby')) {
          isDolby = true;
          dolbyToggle.classList.add('active');
        }
        musicItems = await fetchTracks();
        if (musicItems.length) {
          musicItems.sort((a, b) => (a.IndexNumber || 0) - (b.IndexNumber || 0));
          renderTracks(musicItems);
        } else {
          trackListEl.innerHTML = '<li style="padding:20px;color:rgba(255,255,255,0.5);">No tracks found.</li>';
        }
      })();
    </script>
  </body>
</html>
