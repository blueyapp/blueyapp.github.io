    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Hello Headline", Arial, sans-serif !important;
        background-color: #87c0e8 !important;
        color: #fff;
        transition: background 0.3s, color 0.3s;
        overflow-x: hidden;
      }

      /* ===== TOP NAV BAR ===== */
      .top-nav {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 12px 30px;
        gap: 20px;
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 5000;
      }
      .top-nav a {
        text-decoration: none;
        color: #fff;
        font-weight: bold;
        font-size: 16px;
      }
      .top-nav a:hover { color: #e0e0e0; }

      /* Hamburger */
      .hamburger-btn {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px;
        z-index: 1001;
      }
      .hamburger-btn svg { width: 28px; height: 28px; stroke: #fff; }
      body.dark .hamburger-btn svg { stroke: #fbbf24; }
      .nav-links { display: contents; }
      .mobile-menu-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 999;
      }
      .mobile-menu-overlay.open { display: block; }

      /* Dark mode toggle */
      .darkmode-toggle {
        background: none; border: none; cursor: pointer; border-radius: 50%;
        width: 36px; height: 36px; display: flex; align-items: center;
        justify-content: center; outline: none; padding: 2px; transition: background 0.2s;
      }
      .darkmode-toggle:focus, .darkmode-toggle:hover { background: rgba(128,128,128,0.12); }
      .darkmode-toggle svg { width: 24px; height: 24px; display: block; pointer-events: none; }
      .dark .darkmode-toggle .sun { display: none; }
      .dark .darkmode-toggle .moon { display: block; }
      .darkmode-toggle .moon { display: none; }
      .darkmode-toggle .sun { display: block; }

      /* ===== HERO BANNER ===== */
      .hero-banner {
        position: relative;
        width: 100%;
        height: 100vh;
        background: url('https://cdn.iview.abc.net.au/thumbs/i/X0_67f6fe8d94fe1_3600.jpg') center center / cover no-repeat;
        display: flex;
        align-items: flex-end;
        padding: 60px 50px 80px;
      }
      .hero-banner::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, rgba(135,192,232,0.9) 0%, rgba(135,192,232,0.5) 50%, transparent 100%),
                    linear-gradient(to bottom, transparent 0%, transparent 50%, rgba(135,192,232,0.7) 70%, rgba(135,192,232,1) 100%);
        pointer-events: none;
      }
      .hero-content {
        position: relative;
        z-index: 1;
        max-width: 500px;
      }
      .hero-content .hero-logo {
        width: 200px;
        margin-bottom: 20px;
      }
      .hero-content .hero-label {
        font-size: 15px;
        font-weight: bold;
        color: #1a5276;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }
      .hero-content .hero-title {
        font-size: 28px;
        font-weight: bold;
        color: #0d2f44;
        margin-bottom: 12px;
        line-height: 1.2;
      }
      .hero-content .hero-desc {
        font-size: 16px;
        color: #1a3a4a;
        line-height: 1.6;
        margin-bottom: 24px;
      }
      .play-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 40px;
        background: #404066;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-family: 'Hello Headline', sans-serif;
        font-size: 20px;
        cursor: pointer;
        transition: background 0.2s, transform 0.15s;
        box-shadow: 0 4px 16px rgba(64,64,102,0.4);
      }
      .play-btn:hover { background: #52527a; transform: translateY(-1px); }
      .play-btn svg {
        width: 24px; height: 24px;
        fill: #fff;
      }

      /* ===== PLAYER OVERLAY ===== */
      .player-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(8px);
        z-index: 9000;
        align-items: center;
        justify-content: center;
        padding: 30px;
      }
      .player-overlay.active { display: flex; }
      .player-overlay .close-player {
        position: absolute;
        top: 12px; right: 16px;
        z-index: 9100;
        background: rgba(255,255,255,0.12);
        border: none; color: #fff;
        font-size: 28px;
        width: 44px; height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.2s;
        font-family: 'Hello Headline', sans-serif;
      }
      .player-overlay .close-player:hover { background: rgba(255,255,255,0.25); }

      .player-inner {
        display: flex;
        width: 100%;
        max-width: 1100px;
        max-height: 85vh;
        background: #2d3047;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 16px 60px rgba(0,0,0,0.5);
        position: relative;
      }
      .player-container {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: stretch;
        background: #000;
      }
      .player-overlay .video-js {
        width: 100% !important;
        height: 100% !important;
        border-radius: 0;
      }
      .player-overlay.pip .video-js {
        border-radius: 12px;
      }

      .player-info {
        width: 260px;
        min-width: 220px;
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
      }
      .player-info .info-thumb {
        width: 120px;
        aspect-ratio: 2/3;
        object-fit: cover;
        border-radius: 8px;
        flex-shrink: 0;
      }
      .player-info .info-title {
        font-size: 16px;
        font-weight: bold;
        color: #fff;
        line-height: 1.3;
      }
      .player-info .info-desc {
        font-size: 12px;
        color: #a0aec0;
        line-height: 1.55;
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 5;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .player-info .info-duration {
        font-size: 13px;
        color: #718096;
        font-weight: bold;
      }
      .player-info .info-download {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 14px;
        background: #e2793b;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-family: 'Hello Headline', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s;
        width: fit-content;
      }
      .player-info .info-download:hover { background: #cf6b30; }
      .player-info .info-download svg {
        width: 15px; height: 15px;
        stroke: currentColor; fill: none;
        stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      }

      /* PiP */
      .player-overlay.pip .player-inner {
        background: transparent;
        border-radius: 12px;
        max-width: 100%; max-height: 100%;
        width: 100%; height: 100%;
        box-shadow: none;
      }
      .player-overlay.pip .player-info { display: none; }
      .player-overlay.pip .player-container {
        border-radius: 12px;
        overflow: hidden;
      }
      .player-overlay.pip {
        display: flex;
        top: auto; left: auto;
        bottom: 20px; right: 20px;
        width: 360px; height: 210px;
        padding: 0;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        overflow: hidden;
        cursor: pointer;
        background: #000;
        backdrop-filter: none;
        transition: width 0.3s, height 0.3s, bottom 0.3s, right 0.3s, border-radius 0.3s;
        z-index: 8000;
      }
      .player-overlay.pip .close-player {
        top: 6px; right: 6px;
        width: 30px; height: 30px;
        font-size: 18px;
      }
      .player-overlay.pip .pip-expand { display: flex; }
      .pip-expand {
        display: none;
        position: absolute;
        top: 6px; left: 6px;
        z-index: 9100;
        background: rgba(255,255,255,0.15);
        border: none; color: #fff;
        font-size: 16px;
        width: 30px; height: 30px;
        border-radius: 50%;
        cursor: pointer;
        align-items: center; justify-content: center;
        transition: background 0.2s;
      }
      .pip-expand:hover { background: rgba(255,255,255,0.3); }

      /* ===== DARK MODE ===== */
      body.dark { background: #0f1118 !important; color: #dbeafe !important; }
      body.dark .top-nav a { color: #fbbf24 !important; }
      body.dark .hero-banner::before {
        background: linear-gradient(to right, rgba(15,17,24,0.9) 0%, rgba(15,17,24,0.5) 50%, transparent 100%),
                    linear-gradient(to bottom, transparent 0%, transparent 50%, rgba(15,17,24,0.75) 70%, rgba(15,17,24,1) 100%);
      }
      body.dark .hero-content .hero-label { color: #fbbf24; }
      body.dark .hero-content .hero-title { color: #fff; }
      body.dark .hero-content .hero-desc { color: #b0c4d8; }
      body.dark .play-btn { background: #394867; color: #ffd700; box-shadow: 0 4px 16px rgba(57,72,103,0.4); }
      body.dark .play-btn:hover { background: #4a5f85; }
      body.dark .player-inner { background: #191d25; }
      body.dark .player-info .info-title { color: #fbbf24; }
      body.dark .player-info .info-desc { color: #6b7a8d; }
      body.dark .player-info .info-download { background: #394867; color: #ffd700; }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 900px) {
        .player-overlay { padding: 0; }
        .player-inner {
          flex-direction: column;
          max-height: 100vh; height: 100%; width: 100%;
          border-radius: 0;
        }
        .player-container { flex: none; width: 100%; min-height: 0; }
        .player-info {
          width: 100%; min-width: unset;
          flex: 1; padding: 16px;
          overflow-y: auto;
          flex-direction: row;
          flex-wrap: nowrap;
          gap: 14px;
          align-items: flex-start;
        }
        .player-info .info-thumb {
          width: 80px;
          min-width: 70px;
          aspect-ratio: 2/3;
          flex-shrink: 0;
          border-radius: 6px;
        }
        .player-info .info-text {
          flex: 1;
          min-width: 0;
          display: flex;
          flex-direction: column;
          gap: 6px;
        }
        .player-info .info-title { font-size: 15px; }
        .player-info .info-desc { font-size: 12px; -webkit-line-clamp: 3; }
        .player-info .info-duration { font-size: 12px; }
        .player-info .info-download {
          width: fit-content;
          padding: 6px 12px;
          font-size: 12px;
          margin-top: 4px;
        }
        .player-overlay .close-player {
          top: 10px; right: 12px;
          width: 40px; height: 40px;
          font-size: 24px;
        }
      }
      @media (max-width: 600px) {
        .top-nav { padding: 10px 16px; justify-content: space-between; }
        .hamburger-btn { display: block; }
        .nav-links {
          display: none;
          position: fixed;
          top: 0; left: 0;
          width: 220px; height: 100vh;
          background: #5a9fc6;
          flex-direction: column;
          padding: 60px 24px 24px;
          gap: 20px;
          z-index: 1000;
          box-shadow: 4px 0 20px rgba(0,0,0,0.4);
        }
        body.dark .nav-links { background: #191d25; }
        .nav-links.open { display: flex; }
        .nav-links a { font-size: 18px; }
        .hero-banner { height: 100vh; padding: 40px 20px 80px; }
        .hero-content .hero-logo { width: 140px; }
        .hero-content .hero-title { font-size: 22px; }
        .hero-content .hero-desc { font-size: 14px; }
        .play-btn { font-size: 18px; padding: 14px 32px; }
        .player-overlay.pip {
          width: 200px; height: 120px;
          bottom: 10px; right: 10px;
        }
      }

      /* Toast */
      .toast {
        position: fixed;
        left: 50%; bottom: 20px;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.88);
        color: #fff;
        padding: 10px 14px;
        border-radius: 8px;
        font-family: 'Hello Headline', sans-serif;
        font-size: 14px;
        opacity: 0;
        pointer-events: none;
        transition: opacity .25s, transform .25s;
        z-index: 9999;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }
    </style>
  </head>
  <body>
    <!-- Top Navigation -->
    <nav class="top-nav">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

    <!-- Hamburger menu script -->
    <script>
      const hamburgerBtn = document.getElementById('hamburgerBtn');
      const navLinks = document.getElementById('navLinks');
      const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');
      hamburgerBtn.addEventListener('click', () => {
        navLinks.classList.toggle('open');
        mobileMenuOverlay.classList.toggle('open');
      });
      mobileMenuOverlay.addEventListener('click', () => {
        navLinks.classList.remove('open');
        mobileMenuOverlay.classList.remove('open');
      });
      navLinks.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          navLinks.classList.remove('open');
          mobileMenuOverlay.classList.remove('open');
        });
      });
    </script>

    <!-- Hero Banner -->
    <div class="hero-banner">
      <div class="hero-content">
        <img src="https://disney.images.edge.bamgrid.com/ripcut-delivery/v2/variant/disney/019ca18f-9d87-7638-ae25-905492fa39bb/compose?format=webp" alt="Bluey's Big Play" class="hero-logo" />
        <div class="hero-label">Special</div>
        <p class="hero-desc" id="heroDesc">Bluey and Bingo pull out all the stops to try to get Dad off his phone in their first live stage show, brought to life by brilliant puppets and featuring brand new original music.</p>
        <button class="play-btn" id="playBtn" onclick="startPlaying()">
          <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          Play
        </button>
      </div>
    </div>

    <!-- Player Overlay -->
    <div class="player-overlay" id="playerOverlay">
      <button class="pip-expand" id="pipExpandBtn" onclick="expandFromPip()" title="Expand">&#x26F6;</button>
      <button class="close-player" id="closePlayerBtn" onclick="closePlayer()" title="Close player">&times;</button>
      <div class="player-inner">
        <div class="player-container">
          <video id="player" class="video-js vjs-default-skin vjs-fluid" controls preload="auto" playsinline></video>
        </div>
        <div class="player-info" id="playerInfo">
          <img class="info-thumb" id="infoThumb" src="" alt="Movie poster" />
          <div class="info-text">
            <div class="info-title" id="infoTitle"></div>
            <div class="info-duration" id="infoDuration"></div>
            <div class="info-desc" id="infoDesc"></div>
            <button class="info-download" onclick="downloadMovie()">
              <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- DARK MODE SCRIPT -->
    <script>
      const themeKey = "bluey-site-theme";
      const root = document.body;
      const darkToggle = document.getElementById("darkToggle");
      function setTheme(dark) {
        if (dark) { root.classList.add('dark'); localStorage.setItem(themeKey, "dark"); }
        else { root.classList.remove('dark'); localStorage.setItem(themeKey, "light"); }
      }
      (() => {
        const saved = localStorage.getItem(themeKey);
        if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) { setTheme(true); } else { setTheme(false); }
      })();
      darkToggle.onclick = () => setTheme(!root.classList.contains('dark'));
    </script>

    <!-- APP SCRIPT -->
    <script>
      const serverUrl = "https://blueynet.org:443";
      const apiKey = "6b2548952ea2439ea800b8cd3f1072d1";
      const movieId = "176581";
      let selectedAudioStreamIndex = 1;
      let movieMetadata = {};

      const player = videojs('player', {
        controls: true,
        preload: 'auto',
        muted: false,
        fluid: true,
        html5: {
          vhs: {
            smoothQualityChange: true,
            limitRenditionByPlayerDimensions: true,
            overrideNative: false
          }
        }
      });

      // Player overlay controls
      function openPlayer() {
        const overlay = document.getElementById('playerOverlay');
        overlay.classList.remove('pip');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
      function closePlayer() {
        const overlay = document.getElementById('playerOverlay');
        if (overlay.classList.contains('pip')) {
          player.pause();
          overlay.classList.remove('active', 'pip');
          document.body.style.overflow = '';
        } else {
          overlay.classList.remove('active');
          overlay.classList.add('pip');
          document.body.style.overflow = '';
        }
      }
      function expandFromPip() {
        const overlay = document.getElementById('playerOverlay');
        overlay.classList.remove('pip');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      // Close on Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          const overlay = document.getElementById('playerOverlay');
          if (overlay.classList.contains('active')) closePlayer();
          else if (overlay.classList.contains('pip')) {
            player.pause();
            overlay.classList.remove('active', 'pip');
            document.body.style.overflow = '';
          }
        }
      });

      // PiP click to expand
      document.getElementById('playerOverlay').addEventListener('click', (e) => {
        const overlay = document.getElementById('playerOverlay');
        if (!overlay.classList.contains('pip')) return;
        if (e.target.closest('.close-player') || e.target.closest('.pip-expand')) return;
        expandFromPip();
      });

      function fetchMovieMetadata() {
        return fetch(
          `${serverUrl}/emby/Users/ba603d94a7c24b3b8c7e7ea2fedc9162/Items/${movieId}?fields=ShareLevel&ExcludeFields=VideoChapters,VideoMediaSources,MediaStreams&X-Emby-Token=${apiKey}`
        )
          .then(r => r.json())
          .then(data => {
            movieMetadata = data;
            document.getElementById('heroTitle').textContent = data.Name || "Bluey's Big Play";
            document.getElementById('heroDesc').textContent = data.Overview || '';
            document.getElementById('infoThumb').src = `${serverUrl}/emby/Items/${data.Id}/Images/Primary?X-Emby-Token=${apiKey}`;
            document.getElementById('infoTitle').textContent = data.Name || "Bluey's Big Play";
            document.getElementById('infoDesc').textContent = data.Overview || '';
            const runtime = data.RunTimeTicks ? Math.round(data.RunTimeTicks / 600000000) : '';
            document.getElementById('infoDuration').textContent = runtime ? `${runtime}m` : '';
          })
          .catch(err => console.error("Error retrieving movie metadata:", err));
      }

      function loadAndPlay() {
        fetch(`${serverUrl}/emby/Items/${movieId}/PlaybackInfo?api_key=${apiKey}&Fields=MediaSources`)
          .then(r => r.json())
          .then(playbackInfo => {
            const ms = playbackInfo.MediaSources[0];
            const mediaSourceId = ms.Id;
            const playSessionId = playbackInfo.PlaySessionId;
            const videoStream = ms.MediaStreams.find(s => s.Type === "Video");
            const audioStream = ms.MediaStreams.find(s => s.Type === "Audio");

            const hls = `${serverUrl}/emby/videos/${movieId}/master.m3u8?DeviceId=dd998c9b-ecf6-4b63-a13b-18306834db87&MediaSourceId=${mediaSourceId}&PlaySessionId=${playSessionId}&X-Emby-Token=${apiKey}&VideoCodec=h264,h265,hevc&AudioCodec=mp3,aac&VideoBitrate=${videoStream.BitRate}&AudioBitrate=${audioStream.BitRate}&AudioStreamIndex=${selectedAudioStreamIndex}&TranscodingMaxAudioChannels=2&SegmentContainer=m4s,ts&MinSegments=2&BreakOnNonKeyFrames=True&h264-profile=high,main,baseline,constrainedbaseline&h264-level=62&hevc-codectag=hvc1&TranscodeReasons=ContainerBitrateExceedsLimit`;

            const poster = `${serverUrl}/emby/Items/${movieMetadata.Id}/Images/Thumb?X-Emby-Token=${apiKey}`;

            player.poster(poster);
            player.src({ type: 'application/x-mpegURL', src: hls });

            // Add subtitles
            const rtt = player.remoteTextTracks();
            for (let i = rtt.length - 1; i >= 0; i--) player.removeRemoteTextTrack(rtt[i]);
            player.addRemoteTextTrack({
              kind: 'subtitles',
              label: 'English',
              srclang: 'en',
              src: `${serverUrl}/emby/Videos/${movieMetadata.Id}/${mediaSourceId}/Subtitles/2/0/Stream.vtt?api_key=${apiKey}`,
              default: false
            }, false);

            player.play();

            if ("mediaSession" in navigator) {
              navigator.mediaSession.metadata = new MediaMetadata({
                title: movieMetadata.Name,
                artist: "Special",
                album: "Special",
                artwork: [{
                  src: `${serverUrl}/emby/Items/${movieMetadata.Id}/Images/Thumb?api_key=${apiKey}`,
                  sizes: "1920x1080", type: "image/png",
                }],
              });
              navigator.mediaSession.setActionHandler("play", () => player.play());
              navigator.mediaSession.setActionHandler("pause", () => player.pause());
            }

            document.title = `Bluey's Big PLay`;
          })
          .catch(err => console.error("Error retrieving playback info:", err));
      }

      function startPlaying() {
        openPlayer();
        loadAndPlay();
      }

      function downloadMovie() {
        const downloadUrl = `${serverUrl}/emby/Items/${movieMetadata.Id}/Download?X-Emby-Token=${apiKey}`;
        window.location.href = downloadUrl;
      }

      document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
          screen.orientation.lock('landscape').catch(() => {});
        } else {
          if (screen.orientation.unlock) screen.orientation.unlock();
        }
      });

      // Fetch metadata on load
      document.addEventListener("DOMContentLoaded", () => {
        fetchMovieMetadata();
      });
    </script>
  </body>
</html>
